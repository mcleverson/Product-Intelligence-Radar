    - data:
        code: "from typing import Any, Dict, List\nimport re\n\n\ndef _to_list(obj:\
          \ Any) -> List[Dict[str, Any]]:\n    if isinstance(obj, dict):\n       \
          \ arr = obj.get(\"items\", [])\n        if isinstance(arr, list):\n    \
          \        return [x for x in arr if isinstance(x, dict)]\n    return []\n\
          \n\ndef _clean_markdown(md: str) -> str:\n    if not md:\n        return\
          \ \"\"\n\n    # Remove markdown and HTML images\n    md = re.sub(r\"!\\[[^\\\
          ]]*\\]\\([^\\)]*\\)\", \"\", md)\n    md = re.sub(r\"<img[^>]*>\", \"\"\
          , md, flags=re.IGNORECASE)\n\n    # Remove large data URIs\n    md =\
          \ re.sub(r\"data:image\\/[a-zA-Z0-9.+-]+;charset=[^)]*\", \"\", md)\n\n\
          \    # Remove common boilerplate\n    drop_patterns = [\n        r\"^\\s*\\\
          [Skip to main content\\].*$\",\n        r\"^\\s*Filter\\s*$\",\n       \
          \ r\"^\\s*Loading\\.\\.\\.\\s*$\",\n        r\"^\\s*Save filters\\s*$\"\
          ,\n        r\"^\\s*Clear filters\\s*$\",\n        r\"^\\s*Apply filters\\\
          s*$\",\n    ]\n\n    lines = md.splitlines()\n    kept = []\n    for ln\
          \ in lines:\n        if any(re.match(p, ln, flags=re.IGNORECASE) for p in\
          \ drop_patterns):\n            continue\n        kept.append(ln)\n\n   \
          \ md = \"\\n\".join(kept)\n\n    # Normalize spaces\n    md = md.replace(\"\
          \\r\\n\", \"\\n\").replace(\"\\r\", \"\\n\")\n    md = re.sub(r\"[ \\t]+\"\
          , \" \", md)\n    md = re.sub(r\"\\n{3,}\", \"\\n\\n\", md).strip()\n\n\
          \    return md\n\n\ndef _normalize_item(it: Dict[str, Any]) -> Dict[str,\
          \ Any]:\n    it2 = dict(it)\n\n    metadata = it2.get(\"metadata\", {})\
          \ if isinstance(it2.get(\"metadata\"), dict) else {}\n\n    # Canonicalize\
          \ fields used in prompt\n    it2[\"source_name\"] = it2.get(\"source_name\")\
          \ or it2.get(\"provider\") or \"\"\n    it2[\"published_at\"] = it2.get(\"\
          published_at\") or metadata.get(\"published_at\") or \"\"\n    it2[\"source_id\"\
          ] = it2.get(\"source_id\") or metadata.get(\"source_id\") or \"\"\n    it2[\"\
          tier\"] = it2.get(\"tier\") or metadata.get(\"tier\") or \"\"\n    it2[\"\
          tags\"] = it2.get(\"tags\") or metadata.get(\"tags\") or []\n\n    # Clean\
          \ markdown\n    md = it2.get(\"content_md\")\n    md = md if isinstance(md,\
          \ str) else \"\"\n    md = _clean_markdown(md)\n    it2[\"content_md\"]\
          \ = md\n\n    # Remove duplicates\n    if \"content_markdown\" in it2:\n\
          \        del it2[\"content_markdown\"]\n\n    # Lean metadata\n    it2[\"\
          metadata\"] = {\n        \"source_id\": it2.get(\"source_id\", \"\"),\n\
          \        \"tier\": it2.get(\"tier\", \"\"),\n        \"tags\": it2.get(\"\
          tags\", []),\n        \"published_at\": it2.get(\"published_at\", \"\"),\n\
          \        \"content_len_sent\": len(md),\n    }\n\n    return it2\n\n\ndef\
          \ main(items_obj: Any) -> Dict[str, Any]:\n    base = _to_list(items_obj)\n\
          \    return {\"iter_array\": [_normalize_item(x) for x in base]}"
