    - data:
        code: "from typing import Any, Dict, List\n\n\ndef _to_list(obj: Any) -> List[Dict[str,\
          \ Any]]:\n    # Accept list directly\n    if isinstance(obj, list):\n   \
          \     return [x for x in obj if isinstance(x, dict)]\n    # Accept dict\
          \ with \"items\" key\n    if isinstance(obj, dict):\n        arr = obj.get(\"\
          items\", [])\n        if isinstance(arr, list):\n            return [x for\
          \ x in arr if isinstance(x, dict)]\n    return []\n\n\ndef _compact_for_report(r:\
          \ Dict[str, Any]) -> Dict[str, Any]:\n    c = r.get(\"classification\",\
          \ {}) if isinstance(r.get(\"classification\"), dict) else {}\n\n    return\
          \ {\n        \"title\": r.get(\"title\", \"\"),\n        \"url\": r.get(\"\
          url\", \"\"),\n        \"engine\": r.get(\"engine\", \"\"),\n        \"\
          provider\": r.get(\"provider\", r.get(\"source_name\", \"\")),\n       \
          \ \"published_at\": r.get(\"published_at\", \"\"),\n        \"category\"\
          : c.get(\"category\", \"\"),\n        \"impact_level\": c.get(\"impact_level\"\
          , \"\"),\n        \"competitor_signal\": c.get(\"competitor_signal\", \"\
          \"),\n        \"change_summary\": c.get(\"change_summary\", \"\"),\n   \
          \     \"confidence\": c.get(\"confidence\", 0.5),\n    }\n\n\ndef _chunk(lst:\
          \ List[Dict[str, Any]], n: int) -> List[List[Dict[str, Any]]]:\n    if n\
          \ <= 0:\n        n = 20\n    return [lst[i:i + n] for i in range(0, len(lst),\
          \ n)]\n\n\ndef main(classified_obj: Any) -> Dict[str, Any]:\n    base =\
          \ _to_list(classified_obj)\n    compact = [_compact_for_report(x) for x\
          \ in base]\n\n    chunk_size = 20\n    chunks = _chunk(compact, chunk_size)\n\
          \    iter_array = [\n        {\"chunk_index\": i + 1, \"chunks_total\":\
          \ len(chunks), \"items\": ch}\n        for i, ch in enumerate(chunks)\n\
          \    ]\n    return {\"items_text\": json.dumps(iter_array, ensure_ascii=False)}"
