    - data:
        code: "import json\nfrom typing import Any, Dict, List\n\n\ndef _clamp01(x:\
          \ Any, default: float = 0.5) -> float:\n    try:\n        v = float(x)\n\
          \    except Exception:\n        return float(default)\n    if v < 0:\n \
          \       return 0.0\n    if v > 1:\n        return 1.0\n    return float(v)\n\
          \n\ndef _ensure_list_of_strings(v: Any) -> List[str]:\n    if isinstance(v,\
          \ list):\n        out: List[str] = []\n        for it in v:\n          \
          \  if isinstance(it, str):\n                s = it.strip()\n           \
          \     if s:\n                    out.append(s)\n        return out\n   \
          \ return []\n\n\ndef _pick_enum(v: Any, allowed: List[str], fallback: str)\
          \ -> str:\n    if isinstance(v, str) and v in allowed:\n        return v\n\
          \    return fallback\n\n\ndef _ensure_str(v: Any, fallback: str = \"\")\
          \ -> str:\n    return v if isinstance(v, str) else fallback\n\n\ndef _to_bool(v:\
          \ Any) -> bool:\n    if isinstance(v, bool):\n        return v\n    if isinstance(v,\
          \ (int, float)):\n        return v != 0\n    if isinstance(v, str):\n  \
          \      s = v.strip().lower()\n        if s in {\"true\", \"1\", \"yes\"\
          , \"y\", \"sim\"}:\n            return True\n        if s in {\"false\"\
          , \"0\", \"no\", \"n\", \"nao\", \"não\"}:\n            return False\n \
          \   return False\n\n\ndef _ensure_dict(v: Any) -> Dict[str, Any]:\n    if\
          \ isinstance(v, dict):\n        return v\n    if isinstance(v, str):\n \
          \       try:\n            parsed = json.loads(v)\n            if isinstance(parsed,\
          \ dict):\n                return parsed\n        except Exception:\n   \
          \         return {}\n    return {}\n\n\ndef main(arg1: dict, arg2: dict):\n\
          \    original = _ensure_dict(arg1)\n    out = _ensure_dict(arg2)\n\n   \
          \ allowed_category = [\n        \"pricing\",\n        \"feature\",\n   \
          \     \"region\",\n        \"sla\",\n        \"limits\",\n        \"versions\"\
          ,\n        \"extensions\",\n        \"operations\",\n        \"security\"\
          ,\n        \"deprecation\",\n        \"incident\",\n        \"general_update\"\
          ,\n        \"irrelevant\",\n    ]\n\n    allowed_competitor = [\n      \
          \  \"none\",\n        \"aws\",\n        \"gcp\",\n        \"azure\",\n \
          \       \"oracle\",\n        \"edb\",\n        \"crunchy\",\n        \"\
          aiven\",\n        \"neon\",\n        \"supabase\",\n        \"other\",\n\
          \    ]\n\n    allowed_impact = [\"low\", \"medium\", \"high\"]\n    allowed_market_scope\
          \ = [\"niche\", \"segment\", \"broad\"]\n    allowed_geo_scope = [\"local\"\
          , \"regional\", \"global\"]\n    allowed_customer_scope = [\"smb\", \"mid_market\"\
          , \"enterprise\", \"mixed\"]\n    allowed_value_potential = [\"low\", \"\
          medium\", \"high\"]\n\n    impact_level = _pick_enum(out.get(\"impact_level\"\
          ), allowed_impact, \"low\")\n\n    category = _pick_enum(out.get(\"category\"\
          ), allowed_category, \"irrelevant\")\n    is_relevant = _to_bool(out.get(\"\
          is_relevant\"))\n\n    classification = {\n        \"is_relevant\": is_relevant,\n\
          \        \"category\": category,\n        \"competitor_signal\": _pick_enum(out.get(\"\
          competitor_signal\"), allowed_competitor, \"none\"),\n        \"impact_level\"\
          : impact_level,\n        \"market_scope\": _pick_enum(out.get(\"market_scope\"\
          ), allowed_market_scope, \"segment\"),\n        \"geo_scope\": _pick_enum(out.get(\"\
          geo_scope\"), allowed_geo_scope, \"global\"),\n        \"customer_scope\"\
          : _pick_enum(out.get(\"customer_scope\"), allowed_customer_scope, \"mixed\"\
          ),\n        \"value_potential\": _pick_enum(out.get(\"value_potential\"\
          ), allowed_value_potential, impact_level),\n        \"tam_signal\": _ensure_str(out.get(\"\
          tam_signal\"), \"\"),\n        \"change_summary\": _ensure_str(out.get(\"\
          change_summary\"), \"\"),\n        \"opportunities\": _ensure_list_of_strings(out.get(\"\
          opportunities\")),\n        \"risks\": _ensure_list_of_strings(out.get(\"\
          risks\")),\n        \"confidence\": _clamp01(out.get(\"confidence\"), default=0.5),\n\
          \    }\n\n    if classification[\"category\"] == \"irrelevant\":\n     \
          \   classification[\"is_relevant\"] = False\n\n    if classification[\"\
          is_relevant\"] and not classification[\"change_summary\"].strip():\n   \
          \     classification[\"change_summary\"] = \"Update relevante para [YOUR PRODUCT],\
          \ mas o resumo nao foi extraido com clareza.\"\n\n    classified_row = dict(original)\n\
          \    classified_row[\"classification\"] = classification\n\n    return {\"\
          classified_row\": classified_row}"
