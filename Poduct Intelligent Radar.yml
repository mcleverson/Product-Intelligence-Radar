    - data:
        code: "from typing import Any, Dict, List\n\n\ndef main(arg1: Any):\n    rows\
          \ = arg1 or []\n\n    # If dict {\"items\":[...]} comes instead of list,\
          \ normalize\n    if isinstance(rows, dict):\n        rows = rows.get(\"\
          items\", [])\n    if not isinstance(rows, list):\n        rows = []\n\n\
          \    out_rows: List[Dict[str, Any]] = []\n\n    for r in rows:\n       \
          \ if not isinstance(r, dict):\n            continue\n\n        row = dict(r)\n\
          \n        # Remove heavy payload here, outside the loop\n        for k in [\n\
          \            \"content_md\",\n            \"content\",\n            \"content_html\"\
          ,\n            \"content_markdown\",\n            \"raw_content\",\n   \
          \         \"raw_text\",\n            \"text\",\n            \"markdown\"\
          ,\n            \"html\",\n            \"scrape\",\n            \"page_content\"\
          ,\n        ]:\n            row.pop(k, None)\n\n        # Optional: keep a\
          \ short summary for traceability\n        # Preference: change_summary\
          \ (from LLM) or text_summary/summary if they exist\n        summary = row.get(\"\
